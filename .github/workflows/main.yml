name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Write-Host "Configuring RDP..."

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" `
            -Value 0 `
            -Force

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" `
            -Value 0 `
            -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          netsh advfirewall firewall delete rule name="RDP-Tailscale"

          netsh advfirewall firewall add rule `
            name="RDP-Tailscale" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3389

          Set-Service -Name TermService -StartupType Automatic

          Restart-Service -Name TermService -Force

          Write-Host "RDP configured"


      - name: Create RDP User
        shell: powershell
        run: |
          $password = "Vf7#kP92!xLm45@Q"

          $securePass = ConvertTo-SecureString `
            $password `
            -AsPlainText `
            -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
          }

          New-LocalUser `
            -Name "RDP" `
            -Password $securePass `
            -AccountNeverExpires `
            -PasswordNeverExpires

          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member "RDP"

          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "RDP user created successfully"


      - name: Install Tailscale
        shell: powershell
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"

          $installer = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $installer

          Start-Process `
            msiexec.exe `
            -ArgumentList "/i `"$installer`" /quiet /norestart" `
            -Wait

          Remove-Item $installer -Force

          Write-Host "Tailscale installed"


      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID

          Start-Sleep -Seconds 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

          Write-Host "Tailscale IP: $ip"


      - name: Verify RDP Listener
        shell: powershell
        run: |
          Write-Host "Checking Remote Desktop service..."

          Get-Service TermService

          Write-Host ""
          Write-Host "Checking port 3389..."

          netstat -an | findstr 3389


      - name: Show RDP Details
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "RDP CONNECTION DETAILS"
          Write-Host "=============================="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: .\RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "=============================="


      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active..."
              Start-Sleep -Seconds 300
          }
