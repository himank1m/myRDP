name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Write-Host "Configuring RDP..."

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0 `
            -Force

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 0 `
            -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          netsh advfirewall firewall delete rule name="RDP-Tailscale"

          netsh advfirewall firewall add rule `
            name="RDP-Tailscale" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3389

          Set-Service -Name TermService -StartupType Automatic
          Restart-Service -Name TermService -Force

          Write-Host "RDP configured successfully"


      - name: Create RDP User with Secure Password
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Security

          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + ([char[]](91..96)) + ([char[]](123..126))
          }

          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4

          $password = -join ($rawPassword | Sort-Object { Get-Random })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
          }

          New-LocalUser `
            -Name "RDP" `
            -Password $securePass `
            -AccountNeverExpires

          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member "RDP"

          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "RDP user created"


      - name: Install Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest `
            -Uri $tsUrl `
            -OutFile $installerPath

          Start-Process `
            msiexec.exe `
            -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" `
            -Wait

          Remove-Item $installerPath -Force


      - name: Establish Tailscale Connection
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID

          Start-Sleep -Seconds 10

          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          if (-not $tsIP) {
              Write-Error "No Tailscale IP found"
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

          Write-Host "Tailscale IP: $tsIP"


      - name: Verify RDP Listener
        shell: powershell
        run: |
          Write-Host "Checking RDP port..."

          netstat -an | findstr 3389

          Write-Host "Checking service..."

          Get-Service TermService


      - name: Display RDP Details
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "=============================="
          Write-Host "       RDP ACCESS"
          Write-Host "=============================="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: .\RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "=============================="
          Write-Host ""


      - name: Maintain Connection
        shell: powershell
        run: |
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active..."
              Start-Sleep -Seconds 300
          }
