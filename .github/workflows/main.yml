name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Configure RDP and Firewall
        shell: powershell
        run: |
          Write-Host "Enabling RDP..."

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" `
            -Value 0 `
            -Force

          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" `
            -Value 0 `
            -Force

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          netsh advfirewall firewall add rule `
            name="Tailscale Allow All" `
            dir=in `
            action=allow `
            remoteip=100.64.0.0/10

          netsh advfirewall firewall add rule `
            name="RDP Tailscale" `
            dir=in `
            action=allow `
            protocol=TCP `
            localport=3389 `
            remoteip=100.64.0.0/10

          Set-Service TermService -StartupType Automatic
          Restart-Service TermService -Force

          Write-Host "RDP ready"


      - name: Create RDP User
        shell: powershell
        run: |
          $password = "Vf7#kP92!xLm45@Q"

          $secure = ConvertTo-SecureString `
            $password `
            -AsPlainText `
            -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
          }

          New-LocalUser `
            -Name "RDP" `
            -Password $secure `
            -AccountNeverExpires `
            -PasswordNeverExpires

          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member "RDP"

          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "User created"


      - name: Install Tailscale
        shell: powershell
        run: |
          $url="https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile "$env:TEMP\tailscale.msi"

          Start-Process msiexec.exe `
            -ArgumentList "/i $env:TEMP\tailscale.msi /quiet /norestart" `
            -Wait


      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=gh-runner-$env:GITHUB_RUN_ID

          Start-Sleep -Seconds 15

          $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

          Write-Host "Tailscale IP: $ip"


      - name: Debug Tailscale
        shell: powershell
        run: |
          Write-Host "=== STATUS ==="
          & "$env:ProgramFiles\Tailscale\tailscale.exe" status

          Write-Host "=== NETCHECK ==="
          & "$env:ProgramFiles\Tailscale\tailscale.exe" netcheck

          Write-Host "=== RDP LISTENER ==="
          netstat -an | findstr 3389


      - name: Show Credentials
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "======================"
          Write-Host "RDP ACCESS"
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "USER: .\RDP"
          Write-Host "PASS: $env:RDP_PASSWORD"
          Write-Host "======================"


      - name: Keep Alive
        shell: powershell
        run: |
          while ($true) {
            Write-Host "[$(Get-Date)] RDP Active..."
            Start-Sleep -Seconds 300
          }
